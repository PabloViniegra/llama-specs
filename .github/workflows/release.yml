# Release workflow managed by cargo-dist v0.31.0.
# Triggered by pushing a tag like v0.1.0 → creates a GitHub Release
# with binaries for Linux x86_64, macOS Intel, macOS Apple Silicon, and Windows x86_64.
#
# To cut a release:
#   git tag -a v0.1.0 -m "Release v0.1.0"
#   git push origin v0.1.0

name: Release

permissions:
  contents: write
  id-token: write  # Required for GitHub Attestations (supply-chain security)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:

jobs:
  # ── Plan ─────────────────────────────────────────────────────────────────────
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - id: plan
        run: |
          cargo dist manifest --output-format=json --no-local-paths > dist-manifest.json
          echo "manifest=$(cat dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload dist-manifest
        uses: actions/upload-artifact@v4
        with:
          name: dist-manifest.json
          path: dist-manifest.json

  # ── Build (native runners per target) ─────────────────────────────────────
  build-local-artifacts:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04

          - target: x86_64-apple-darwin
            os: macos-13          # Intel runner

          - target: aarch64-apple-darwin
            os: macos-14          # Apple Silicon (M1) runner

          - target: x86_64-pc-windows-msvc
            os: windows-2022

    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Three-level cargo cache (registry + git index + compiled deps).
      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-dist
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == windows* ]]; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.ps1 | powershell -Command -
          else
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
          fi

      - name: Build binary
        run: cargo dist build --target=${{ matrix.target }} --artifacts=local

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: target/distrib/

  # ── Publish to GitHub Releases ─────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [plan, build-local-artifacts]
    # Only create a real release when a version tag is pushed (not on PRs).
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Create GitHub Release
        run: cargo dist publish --output-format=json
